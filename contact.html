<body>

  <a class="skip-link" href="#main-content">
    Skip to main content
  </a>

  <header role="banner">

    <div class="container">

      <h1>Contact Me</h1>

      <nav aria-label="Main Navigation">

        <ul class="nav-list">

          <li>
            <a href="index.html">Home</a>

          <li>

          <li>

              Contact
            </a>

        </ul>

      </nav>

    </div>

  </header>

  <main id="main-content">

    <section aria-labelledby="contact-heading">

      <div class="container">

        <h2 id="contact-heading">
          Get In Touch
        </h2>

        <p>
          Email:
          deepikadharshiniKattula@gmail.com
        </p>

       <form
  action="https://formsubmit.co/deepikadharshinikattula@gmail.com"
  method="POST"
>

  <input
    type="hidden"
    name="_captcha"
    value="false"
  />

  <div class="form-group">

    <label for="name">
      Full Name
    </label>

    <input
      type="text"
      id="name"
      name="name"
      required
    />

  </div>

  <div class="form-group">

    <label for="email">
      Email Address
    </label>

    <input
      type="email"
      id="email"
      name="email"
      required
    />

  </div>

  <div class="form-group">

    <label for="message">
      Message
    </label>

    <textarea
      id="message"
      name="message"
      rows="6"
      required></textarea>

  </div>

  <button type="submit">
    Send Message
  </button>

</form>
      

      </div>

    </section>

  </main>

  <footer role="contentinfo">

    <div class="container">

      <p>
        © 2026 Deepika Dharshini
      </p>

    </div>

  </footer>

</body>
